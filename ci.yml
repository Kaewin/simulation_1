name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# A newer push to the same branch/PR cancels the older in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev

      # raylib is built from source via FetchContent. Cache the fetched +
      # compiled dependency so it isn't rebuilt on every run. The key is tied
      # to CMakeLists.txt, so bumping the raylib version invalidates it cleanly.
      - name: Cache raylib build
        uses: actions/cache@v6
        with:
          path: build/_deps
          key: raylib-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel
